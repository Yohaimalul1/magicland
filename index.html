#veil{position:fixed;inset:0;z-index:0;background:radial-gradient(ellipse 85% 65% at 50% 32%,rgba(7,3,24,.30),rgba(7,3,24,.86) 95%)}
#stars{position:fixed;inset:0;z-index:0;pointer-events:none;opacity:.7}
.wrap{position:relative;z-index:2;max-width:1180px;margin:0 auto;padding:0 22px}

/* NAV */
nav{position:sticky;top:0;z-index:50;backdrop-filter:blur(14px);background:rgba(8,3,26,.55);border-bottom:1px solid var(--stroke)}
nav .wrap{display:flex;align-items:center;justify-content:space-between;height:68px;gap:12px}
.brand{display:flex;align-items:center;gap:11px;font-family:'Baloo 2';font-weight:800;font-size:22px;direction:ltr}
.brand .blogo{width:40px;height:40px;border-radius:50%;background:var(--astro) center/cover;border:2px solid rgba(255,210,74,.5);box-shadow:0 0 18px rgba(255,138,61,.5);display:inline-block;flex:none}
.brand b{background:linear-gradient(90deg,#ffd24a,#ff8a3d,#ff3d9a);-webkit-background-clip:text;background-clip:text;color:transparent}
.nav-right{display:flex;align-items:center;gap:12px}
.lang-btn{cursor:pointer;font-family:'Heebo';font-weight:700;font-size:14px;color:#fff;background:rgba(255,255,255,.08);border:1px solid var(--stroke);padding:8px 14px;border-radius:999px;transition:.2s}
.lang-btn:hover{background:rgba(255,255,255,.16)}
.nav-cta{font-weight:700;font-size:14px;padding:9px 16px;border-radius:999px;color:#1a0730;text-decoration:none;background:linear-gradient(90deg,#ffd24a,#ff8a3d);box-shadow:0 6px 20px rgba(255,138,61,.4);transition:.25s;white-space:nowrap}
.nav-cta:hover{transform:translateY(-2px);box-shadow:0 10px 28px rgba(255,138,61,.6)}

/* HERO */
header{position:relative;text-align:center;padding:60px 0 30px}
.astro{width:clamp(180px,26vw,260px);aspect-ratio:1/1;display:inline-block;background:var(--astro) center/cover;border-radius:24px;filter:drop-shadow(0 20px 50px rgba(155,107,255,.55));animation:float 6s ease-in-out infinite}
@keyframes float{0%,100%{transform:translateY(0) rotate(-3deg)}50%{transform:translateY(-22px) rotate(3deg)}}
h1.title{font-family:'Baloo 2';font-weight:800;font-size:clamp(42px,8.5vw,88px);line-height:1.03;margin:6px 0;letter-spacing:-1px;text-shadow:0 4px 30px rgba(0,0,0,.5)}
h1.title .hl{background:linear-gradient(110deg,#ffd24a,#ff8a3d 35%,#ff3d9a 65%,#9b6bff);background-size:200% auto;-webkit-background-clip:text;background-clip:text;color:transparent;animation:shimmer 6s linear infinite}
@keyframes shimmer{to{background-position:200% center}}
.sub{font-size:clamp(16px,2.3vw,21px);color:var(--muted);max-width:640px;margin:10px auto 26px;font-weight:300;text-shadow:0 2px 14px rgba(0,0,0,.6)}
.hero-cta{display:inline-flex;align-items:center;gap:10px;font-weight:800;font-size:18px;padding:15px 34px;border-radius:999px;color:#1a0730;text-decoration:none;background:linear-gradient(90deg,#ffd24a,#ff8a3d);box-shadow:0 12px 34px rgba(255,138,61,.45);transition:.25s}
.hero-cta:hover{transform:translateY(-3px) scale(1.03);box-shadow:0 18px 44px rgba(255,138,61,.65)}
.stats{display:flex;justify-content:center;gap:46px;flex-wrap:wrap;margin:44px 0 8px}
.stat b{display:block;font-family:'Baloo 2';font-size:40px;background:linear-gradient(90deg,#46e8ff,#9b6bff);-webkit-background-clip:text;background-clip:text;color:transparent}
.stat span{color:var(--muted);font-size:14px;letter-spacing:.4px}

/* SECTION */
.sec-head{text-align:center;margin:66px 0 32px}
.sec-head h2{font-family:'Baloo 2';font-size:clamp(30px,5vw,46px);font-weight:800}
.sec-head h2 .hl{color:var(--orange)}
.sec-head p{color:var(--muted);margin-top:8px;font-weight:300}

/* GAMES GRID */
.games{display:grid;grid-template-columns:repeat(auto-fit,minmax(330px,1fr));gap:28px;padding-bottom:30px}
.card{position:relative;background:var(--card);border:1px solid var(--stroke);border-radius:26px;overflow:hidden;
  backdrop-filter:blur(10px);transition:transform .4s cubic-bezier(.2,.8,.2,1),box-shadow .4s,border-color .4s;
  opacity:0;transform:translateY(40px)}
.card.in{opacity:1;transform:translateY(0)}
.card:hover{transform:translateY(-10px);border-color:rgba(255,138,61,.45);box-shadow:0 26px 60px rgba(0,0,0,.5),0 0 50px var(--gcolor,rgba(255,138,61,.25))}
.shots{position:relative;height:188px;overflow:hidden;background:#0c0526;border-bottom:1px solid var(--stroke)}
.shots .track{display:flex;gap:10px;padding:14px;height:100%;width:max-content;animation:slide var(--dur,26s) linear infinite}
.card:hover .shots .track{animation-play-state:paused}
.shots img{height:100%;border-radius:12px;box-shadow:0 6px 18px rgba(0,0,0,.4);background:#1a0b3a}
@keyframes slide{from{transform:translateX(0)}to{transform:translateX(-50%)}}
.shots::after{content:"";position:absolute;inset:0;background:linear-gradient(90deg,rgba(12,5,38,.9),transparent 12% 88%,rgba(12,5,38,.9));pointer-events:none}
.card-body{padding:18px 22px 24px;position:relative;background:linear-gradient(180deg,rgba(20,9,52,.85),rgba(12,5,38,.6))}
.head{display:flex;align-items:center;gap:14px;margin-top:-48px;margin-bottom:14px;position:relative;z-index:3}
.icon{width:72px;height:72px;border-radius:18px;border:2px solid rgba(255,255,255,.35);box-shadow:0 10px 26px rgba(0,0,0,.6);background:#1a0b3a;flex:none}
.titles{background:rgba(12,5,38,.78);backdrop-filter:blur(6px);padding:7px 12px;border-radius:12px;align-self:flex-end}
.titles h3{font-family:'Baloo 2';font-size:19px;font-weight:800;line-height:1.15}
.titles .genre{display:inline-block;margin-top:5px;font-size:12px;font-weight:600;color:var(--gcolor,#ffb37a);background:rgba(255,255,255,.07);padding:3px 11px;border-radius:999px;border:1px solid var(--stroke)}
.desc{color:var(--muted);font-size:15px;line-height:1.6;font-weight:300;min-height:96px}
.play{display:flex;align-items:center;justify-content:center;gap:9px;width:100%;margin-top:14px;padding:13px;border-radius:14px;text-decoration:none;font-weight:700;font-size:16px;color:#fff;background:linear-gradient(90deg,var(--gcolor,#ff8a3d),#9b6bff);box-shadow:0 8px 22px rgba(0,0,0,.4);transition:.25s}
.play:hover{filter:brightness(1.12);transform:translateY(-2px)}
.play svg{width:20px;height:20px;fill:#fff}

/* CTA band */
.band{margin:80px 0 30px;text-align:center;padding:52px 26px;border-radius:30px;
  background:linear-gradient(120deg,rgba(255,138,61,.16),rgba(155,107,255,.18));border:1px solid var(--stroke);position:relative;overflow:hidden;backdrop-filter:blur(6px)}
.band h2{font-family:'Baloo 2';font-size:clamp(26px,4vw,40px);margin-bottom:10px}
.band p{color:var(--muted);margin-bottom:24px;font-weight:300;max-width:560px;margin-inline:auto}

footer{text-align:center;padding:44px 0 40px;color:var(--muted);font-size:14px;border-top:1px solid var(--stroke);margin-top:40px;background:rgba(8,3,26,.4)}
footer .brand{justify-content:center;font-size:18px;margin-bottom:10px}
footer a{color:var(--orange);text-decoration:none}

@media(max-width:520px){.stats{gap:30px}.nav-cta{display:none}.desc{min-height:0}}
</style>
</head>

const PLAY='<svg viewBox="0 0 24 24"><path d="M3 2.5v19c0 .8.9 1.3 1.6.9l16.2-9.5c.7-.4.7-1.4 0-1.8L4.6 1.6C3.9 1.2 3 1.7 3 2.5z"/></svg>';
const grid=document.getElementById('grid');
let io;

function buildCards(lang){
  grid.innerHTML='';
  GAMES.forEach((g,i)=>{
    const url="https://play.google.com/store/apps/details?id="+g.id;
    const strip=[...g.shots,...g.shots].map(s=>`<img loading="lazy" src="${sh(s)}" alt="${g.title} screenshot">`).join('');
    const el=document.createElement('article');
    el.className='card';
    el.style.setProperty('--gcolor',g.color);
    el.style.transitionDelay=(i*80)+'ms';
    el.innerHTML=`
      <div class="shots"><div class="track" style="--dur:${22+i*4}s">${strip}</div></div>
      <div class="card-body">
        <div class="head">
          <img class="icon" src="${g.icon}" alt="${g.title} icon">
          <div class="titles"><h3>${g.title}</h3><span class="genre">${g.genre[lang]}</span></div>
        </div>
        <p class="desc">${g.desc[lang]}</p>
        <a class="play" href="${url}" target="_blank" rel="noopener">${PLAY} ${I18N[lang].play}</a>
      </div>`;
    grid.appendChild(el);
  });
  if(io) io.disconnect();
  io=new IntersectionObserver(es=>es.forEach(e=>{if(e.isIntersecting){e.target.classList.add('in');io.unobserve(e.target)}}),{threshold:.12});
  document.querySelectorAll('.card').forEach(c=>io.observe(c));
}

function setLang(lang){
  const t=I18N[lang];
  document.documentElement.lang=lang;
  document.documentElement.dir = lang==='he'?'rtl':'ltr';
  document.querySelectorAll('[data-i18n]').forEach(el=>{el.textContent=t[el.getAttribute('data-i18n')];});
  document.getElementById('heroCta').textContent=t.hero_cta;
  document.getElementById('navCta').textContent=t.nav_cta;
  document.getElementById('bandCta').textContent=t.band_cta;
  document.getElementById('langBtn').textContent=t.langBtn;
  buildCards(lang);
  try{localStorage.setItem('mlLang',lang);}catch(e){}
}

let cur=(()=>{try{return localStorage.getItem('mlLang')}catch(e){return null}})() || 'en';
setLang(cur);
document.getElementById('langBtn').addEventListener('click',()=>{cur=cur==='en'?'he':'en';setLang(cur);});

/* ---------- starfield twinkle ---------- */
const cv=document.getElementById('stars'),cx=cv.getContext('2d');let W,H,st;
function rs(){W=cv.width=innerWidth;H=cv.height=innerHeight;st=Array.from({length:Math.min(120,innerWidth/12|0)},()=>({x:Math.random()*W,y:Math.random()*H,z:Math.random()*1.4+.3,t:Math.random()*6.28}))}
rs();addEventListener('resize',rs);
(function loop(){cx.clearRect(0,0,W,H);for(const s of st){s.t+=.03;const a=.3+Math.sin(s.t)*.35;cx.beginPath();cx.fillStyle=`rgba(255,255,255,${a})`;cx.arc(s.x,s.y,s.z,0,6.28);cx.fill();s.y+=s.z*.1;if(s.y>H){s.y=0;s.x=Math.random()*W}}requestAnimationFrame(loop)})();
</script>
